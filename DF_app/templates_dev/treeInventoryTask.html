{% block sidebar_filters %}

<!-- Display options -->
<h6 class="text-uppercase text-body-secondary small fw-bold mb-2">Display options</h6>
<div class="form-check form-switch mb-1">
    <input class="form-check-input" type="checkbox" id="scientificNamesSwitch">
    <label class="form-check-label" for="scientificNamesSwitch">Use scientific names</label>
</div>
<div class="form-check form-switch mb-3">
    <input class="form-check-input" type="checkbox" id="countyBordersSwitch">
    <label class="form-check-label" for="countyBordersSwitch">Overlay county borders</label>
</div>

<hr>

<!-- Inventory year -->
<h6 class="text-uppercase text-body-secondary small fw-bold mb-2">Inventory year</h6>
<div class="input-group mb-2">
    <span class="input-group-text" id="inventoryyearcheckbox">From</span>
    <select class="form-select" id="sel_year" aria-label="Start year">
        <option id="selyearinitial" selected>Select</option>
    </select>
</div>
<div class="input-group mb-3">
    <span class="input-group-text" id="inventoryyearcheckbox2">To</span>
    <select class="form-select" id="sel_year2" aria-label="End year">
        <option id="selyearinitial2" selected>Select</option>
    </select>
</div>

<hr>

<!-- Tree family -->
<h6 class="text-uppercase text-body-secondary small fw-bold mb-2">Tree family</h6>
<div id="tree-family" class="mb-3">

    <div class="taxon-row d-flex align-items-center gap-2 mb-1">
        <span class="taxon-bubble" aria-hidden="true"></span>
        <button class="taxbutton text-button-levelone taxon-toggle btn btn-sm btn-outline-success flex-grow-1 text-start d-flex align-items-center justify-content-between"
                type="button"
                cname="angiosperms"
                sname="Magnoliopsida"
                value="NCBITaxon_3398"
                id="angiosperms"
                data-level="clade">
            <span class="taxon-label">Hardwood</span>
            <span class="taxon-chevron" aria-hidden="true">▸</span>
        </button>
    </div>
    <div class="level-two-filter-box" id="angiospermfamilygroup"></div>

    <div class="taxon-row d-flex align-items-center gap-2 mb-1 mt-2">
        <span class="taxon-bubble" aria-hidden="true"></span>
        <button class="taxbutton text-button-levelone taxon-toggle btn btn-sm btn-outline-success flex-grow-1 text-start d-flex align-items-center justify-content-between"
                type="button"
                cname="gymnosperms"
                sname="Acrogymnospermae"
                value="NCBITaxon_1437180"
                id="gymnosperms"
                data-level="clade">
            <span class="taxon-label">Softwood</span>
            <span class="taxon-chevron" aria-hidden="true">▸</span>
        </button>
    </div>
    <div class="level-two-filter-box" id="gymnospermfamilygroup"></div>

</div>

<!-- Tree property filters -->
<h6 class="text-uppercase text-body-secondary small fw-bold mb-2">Tree properties</h6>
<div id="tree-filters" class="d-flex flex-column gap-2 mb-3">

    <div class="card">
        <div class="card-body py-2">
            <div class="form-check">
                <input class="form-check-input treefilterschkbox treepropslidercheckbox"
                       type="checkbox" id="dbhcheckbox" name="dbhcheck" value="TreeDiameterAtBreastHeight">
                <label class="form-check-label" for="dbhcheckbox">Diameter at Breast Height</label>
            </div>
            <div class="slider mt-2" id="dbhslider"></div>
        </div>
    </div>

    <div class="card">
        <div class="card-body py-2">
            <div class="form-check">
                <input class="form-check-input treefilterschkbox treepropslidercheckbox"
                       type="checkbox" id="tahcheckbox" name="tahcheck" value="TreeActualHeight">
                <label class="form-check-label" for="tahcheckbox">Tree Actual Height</label>
            </div>
            <div class="slider mt-2" id="tahslider"></div>
        </div>
    </div>

    <div class="card">
        <div class="card-body py-2">
            <div class="form-check">
                <input class="form-check-input treefilterschkbox treepropslidercheckbox"
                       type="checkbox" id="tthcheckbox" name="tthcheck" value="TreeTotalHeight">
                <label class="form-check-label" for="tthcheckbox">Tree Total Height</label>
            </div>
            <div class="slider mt-2" id="tthslider"></div>
        </div>
    </div>

    <div class="card">
        <div class="card-body py-2">
            <div class="form-check">
                <input class="form-check-input treefilterschkbox treepropclassgroupcheckbox"
                       type="checkbox" id="tscheckbox" value="TreeStatus">
                <label class="form-check-label" for="tscheckbox">Tree Status</label>
            </div>
            <div class="list-group classgroup mt-2" id="tsgroup"></div>
        </div>
    </div>

</div>

<div class="d-grid">
    <button class="btn btn-primary" id="generateMapButton" type="button">Generate Map</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="/static/scripts/treeInventoryTask.js"></script>

{% endblock %}
